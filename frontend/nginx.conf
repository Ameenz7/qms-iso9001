server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — everything routes to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively
  location ~* \.(js|css|woff2?|ico|png|svg|jpg|jpeg|gif)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}
