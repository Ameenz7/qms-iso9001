upstream backend_upstream {
  server backend:3000;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API requests to the NestJS backend.
  # Using a regex location avoids the trailing-slash 301 redirect that
  # converts POST → GET (the cause of "Cannot GET /api/invites/accept").
  # An upstream block is used so nginx resolves "backend" at startup
  # instead of needing a runtime resolver (required with variable $proxy_pass).
  location ~ ^/api/(.*)$ {
    proxy_pass http://backend_upstream/api/$1$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "keep-alive";
    proxy_cache_bypass $http_upgrade;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
